- project: "Vizy AI"
  role: "Self-Project"
  description: >
    Built a fully local AI-driven data visualization system using Ollama with llama3.2-vision:11b, ensuring no API cost. 
    Automated generation of visualizations (PCA, t-SNE, SOM, correlations, distributions) from raw input datasets. 
    Ranked top-N informative plots and used the qwen3-vl:8b vision LLM to generate insights from visual patterns.

- project: "Velocity Video Editor"
  role: "Self-Project"
  description: >
    Built and deployed in Hugging Face an image-to-video reel generation app using Python, MoviePy, OpenCV, and PIL. 
    Engineered a computer vision pipeline for image preprocessing, beat-synced effects, and vertical video composition. 
    Optimized deployment on HF CPU using automatic image deletion to ensure memory efficiency and data privacy.
